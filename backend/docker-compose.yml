version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: lawra_marketplace_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lawra_marketplace
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d lawra_marketplace']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
